version: "3.8"

x-sim-common: &sim-common
  build: ./tree_dt/simulator
  networks:
    - orchard-net
  environment:
    SAMPLE_RATE_MINUTES: 1
    SIMULATOR_PORT: 5012

x-dt-common: &dt-common
  build: ./tree_dt/dt_logic
  volumes:
    - ./config.yaml:/app/config.yaml:ro
  networks:
    - orchard-net
  environment:
    BASYX_SUFFIX: aas
    DT_SUFFIX: logic
    DT_PORT: 8000


services:

  # Per tree:
  #   treeX_aas       — Eclipse BaSyx Java AAS server
  #   treeX_init      — One-shot script that creates the AAS shell + submodel
  #   treeX_simulator — Generates synthetic sensor data, pushes to treeX_aas
  #   treeX_logic     — P2P heartbeat discovery + reads from BaSyx + anomaly detection

  #######################################################
  # Tree 1
  #######################################################
  tree1_aas:
    image: eclipsebasyx/aas-server:1.4.0
    ports: ["8081:4001"]
    networks:
      - orchard-net
    container_name: tree1_aas

  tree1_init:
    build: ./tree_dt/init
    environment:
      AAS_URL: http://tree1_aas:4001
      DT_ID: dt_01
    networks:
      - orchard-net
    container_name: tree1_init
    depends_on:
      - tree1_aas

  tree1_simulator:
    <<: *sim-common
    ports: ["9001:5012"]
    environment:
      AAS_URL: http://tree1_aas:4001
      DT_ID: dt_01
    container_name: tree1_simulator
    depends_on:
      - tree1_aas
      - tree1_init

  tree1_logic:
    <<: *dt-common
    ports: ["8001:8000"]
    environment:
      AAS_URL: http://tree1_aas:4001
      DT_ID: dt_01
    container_name: tree1_logic
    depends_on:
      - tree1_aas

